body:
  text: 林外野言卷下元郭翼撰題張戡畫瘦馬圖瘦骨鋒稜珠汗落卧痕半雜古苔烟未脱將軍金匼匝又䭾兒女玉嬋娟蒼黄日色龍沙外􅆭淡秋聲塞雁前神駿只今誰貌得開圖老眼一醒然燕婁東園分韻得五字苕苕望瀛洲流雲下東渚笛教仙人借酒使文君取篔簹寫林緑菡蓞發江雨煌煌金閨姿天動星文聚華辭播蘭􅉅繁價登瓊珇龍鍔秋濤淨鳳羽雲色五燕敖亦云暢驩集那得屢驕驄蹋晚轡閣門凉月舉寄郯九成懷鐵崖且聞有挾璚花赴倪雲林之約就柬府中從事近將書只道清狂事事無雪艇不來邀陸倩雲林直去看倪迂醉時自舞銕如意愁裏休歌玉唾壺揚子草堂頻有約速來滿眼為君酤江水辭二章江水一百里送君君去時丁寜桃葉渡莫唱渡江辭其二江水一百里江流七十盤初三弦上月相憶照灣環題宋髙宗詩便面康邸龍飛日中原不可支乘輿猶北狩淚濕畫中詩江南曲江南暄新花月天美人盤㳺緩愁年翠環嬌春扶上船扶上船月如水霞蓋車度花裏㳺女曲麝衣寳珞花氤氲芙蓉小釵金鵞裙流目艷艷思若雲思若雲可憐嬌玉條脱金歩搖采蓮曲青溪小姑雙嬋娟蓬蓬荷葉金槳船含情戱采並目蓮並目蓮為郎喜刺滿莖傷玉指采菱曲湖灣小婦歌采菱盪舟曲曲去相迎花開鏡裏搖明星搖明星妬華月郎不歸怨花發陽春曲柳色青堪把櫻花雪未乾宫中裁白紵猶怯剪刀寒鳳臺曲聞道嬴家女吹簫入紫雲如何鳳臺上不棲祖龍君淮南王曲漢武好神仙淮南去不還徒令風雨客感慨茂陵阡獨漉篇求禄求禄清白不濁清白尚可貪汚殺我明明日月麗乎太清明君當宁明臣在廷賞不虛功刑必當罰孰將溷溷我寜察察濯乎不洿皭乎不緇暮夜之金弗替於懷幸甚至哉歌以言志自君之出矣自君之出矣花開又花謝思君如日月耿耿晝復夜其二自君之出矣徒守零落耳思君如車輪輾轉愁不已其三自君之出矣琴瑟何曽御思君如落葉蕭瑟悲秋暮明鏡篇開鏡珠璣匣盤龍百鍊金使君持照妾不解照君心蓮子曲蓮子復蓮子苦心郎不嘗為郎剥蓮子蓮子憶空房汴隄曲已信隄名汴誰教柳姓楊龍舟行樂地不得復歸唐王孫曲春來百種艸無那怨王孫迷却郎歸路萋萋不斷根夜夜曲蕙花空帳不生春香壁泥紅墮網塵㣲歩珊珊燈影裏金屏夜降李夫人題柯敬仲梅花竹石圖夜寒起坐看龍影金閣罘罳小殿東夢覺香吹梅子樹玉文堂上月方中題李遵道小寒林圖溪泉溪樹滿春青寫入桃源翡翠屏楊子風流那可得為渠安箇銕厓亭題倪元鎮畫雲林圖鬱鬱倦時燠雲漢雨如洗美人既云遘胡寜不忻喜㣲烟升夕樹鮮月度秋水人生豈所適所適正在爾蹋踘篇和鐵厓韻四首簇花小銀雲作團雙尖繡襪星流丸金蟬束腰燕盤盤燕盤盤綵門下第一名齊雲社其二倡園小奴花箇箇蹋踘朝朝花裏過釵墜蜻蜓髻倭墮髻倭墮玉瓏􅋛倚嬌樹雙臉紅其三緑雲草色光如苔綵樓紅扇相當開美人凌波蹴月來蹴月來不墮地袖回風動羅袂其四落花水流春滿路走紅踘踘羅塵歩繡襦鴛鴦暖香霧暖香霧酒光獰紅暎肉太嬌生題仙山樓觀圖五雲樓閣世間無日月龍光出綺疏王母衆中金羽蓋雙成扶下紫雲轝題美人圖上清宫殿五雲車降下仙人蕚緑華怪得雪衣無箇信只將條脱寄羊家題詩意圖鬱金堂上春濃否薄薄羅襦杏子紅白日繡忩鸎不語都縁詩思落花中題倪元鎮畫不見草堂榿樹西早來雲氣忽相迷野老迴船怕風雨竹雞柵裏莫教啼題秋山圖山上浮雲天幾重秋髙花散玉芙蓉好攜謝朓驚人語醉裏來登落雁峯絶句六首沙洲蘆葦如城郭水深門前百丈洪老漁曬網卧日裏稚子捉船行水中其二楊柳蓋江花蓋屋就中二月覺春多一雙白鵠浮新舫窣迹紅雲踏艷歌其三髙桃花發江林裏蝶㺯鶯銜四散飛便開金􅊦留連看莫放青春造次歸其四可惜清明雨也晴好春須看水東亭桃花如馬斑斑色楊柳藏鴉樹樹青其五芣苢新生蓋地面辛夷髙開滿上頭生憎雨惡兼風惡轉益朝愁復暮愁其六雨多二月連正月草没南園與北園一向無情花片片百般如怨鳥言言崑山謠送友人吳東之州婁東江民廬矗矗如蠭房官車客馬交馳橫紅塵軋投康與莊雞鳴閙市森開張珠犀翠象在道傍吳艎越艦萬首驤大㠶雲落如山崩舟工花股百夫雄蠻音䝤語如吃羌水仙祠前海茫茫魚鼈作道虹作梁龍堂貝闕當中央靈女媛歌吹笙簧馮夷伐鼓相鏗轟或乘飛龍下滄浪大檣小檣火流光翠旓摩雲互低昻左驅勾陳右攙搶天子錫命下南邦重臣下拜靈慈宫太平無象躋成康吾州富庶文物昌厥田下下賦下上歳貢天府民職恭君子誾誾講虞唐小人業業為工商大夫從事舉賢明掌曹僚屬登其良王郎作掾材用長理煩剸劇乃不蘉自少軒輊有父風穰穰學業盈囷倉乃翁七十鬚眉蒼二三昆季故昻藏中郎虎髯黠而彊誠心懇懇愛其兄願汝忠謇為國禎子孫昭孝百禄將願集中正以為裳願以仁義雜為珩願言揖子以為明徳音秩秩亦孔章天台行送友人吾聞天台山一萬八千丈赤霞壁立百雉城閶闔天開勢摩蕩瓊臺雙闕雲幾重羣山俯伏華頂雄靈仙𤣥聖所窟宅紫氣彷彿飛㳺龍滄溟直下但如沼青烟東望蓬萊小火珠光動金銀宫日月跳丸幾昬曉丹厓氣散如飛霜草木冬夏涵天香羽人霄蓋擁旌節雨衣雲帶雙翺翔石橋縹緲那可度憑雷躡雲天所怒不知方廣今有無如何絶却人間路有客有客多好竒方舟明日過靈溪青山之谷事幽討手援芝草歌我詩贈卜香印錢道人吾聞軒轅師廣成仙成騎龍鼎湖升獨遺弓劍在人世白雲冉冉連星辰崆峒之天三十六日月珠光照龍燭何年贈汝棗木盤玉字靈香勘神卜道人十口家一船瓦盤沽酒有酒錢桃花洞洞紅滿烟塵流一隔三千年送道士遊武當武當諸峰何壯哉大朶小朶青蓮開𤣥聖中居天地户赤日下照金銀臺神龜六眼電光走山鬼一足雲頭來道人再拜望北極應帶滿身星斗回奉同袁子英柬呈楊亷夫先生楊子十年官不調如此永州文力何洞庭鐵笛龍吹得天上瓊書鶴寄多車子看花將一兩雪兒行酒艷雙歌時時對客教弦索繡領單衫月色羅和讀李五峰集先生住婁八十日金石遺音手自題人物風流擬江左文章典雅重淮西鳳來山郭時稱瑞鯨破滄溟勢欲齊著作新聞徴士詔天光久待照青藜桂花曲花開沓沓金為粟葉宻藂藂翠蓋烟不分月中惟一樹要將秋色種諸天欸乃歌詞并序呉與卜者浮舟為家遨逰往來具能道山水之勝請予言其狀如杜之歌䕫州禹錫之竹枝也因製欸乃新詞五章遺之言固鄙俚不能當古作者然或逺方懷其風俗使歌之亦足樂也榻頭船子小如車賣卜狂逰屬當家直到年頭與年尾不開看月即看花其二芙蓉秋裏遶城開溪月溪烟幾畨來駱駝橋頭有酒賣鷗波亭下棹船回其三道塲何山山最雄弁中形勝聞吳中七十二峰菡蓞緑四月五月楊梅紅其四上塘船行無斷頭下塘船少好安流兩岸青山天上坐看山吹笛上杭州其五城東城西楊柳多女郎不唱本鄉歌那箇新傳欸乃曲落花風裏奈春何江南采蓮曲渉烟采芙蓉湖波秋影蕩天開明鏡入鳥下青菰蔣佳人弭輕檝緑水歌兩兩江南有愁思落日空蒼莽春愁曲春陽動宫沼花色明闌薄文鶯穿柳過黃蜂粘絮落霓裳久不舞叢簧愁未灼寜知色易衰秖念恩如昨無題和袁子英四首雲中錦隊衛旌幢帝子乘舟思滿江不惜鳳弦閒寳瑟却教龍女䕶瑤忩淚花筠竹坡千頃愁雨蒼梧玉一雙萬古湘南遺廟在至今清怨未能降其二瓊宫花發滿神臯花下吹笙紫繡袍不學鳳臺秦弄玉也歌樂府鄭櫻桃珊瑚舊夢留春枕􅎛桂新香暖夜醪轆轆羊車過别院仰看星斗覺心勞其三繞帳犀珠星影移銅華鋪首嚙雙螭守宫㸃臂斑斑血結帶同心寸寸絲機上金梭迴艷錦篋中玉子卜靈棋飛花解繫相思否莫倩韓家賦柳枝其四紫殿長楊滿路塵驪山荒草没麒麟伶𤣥作傳追飛燕李白歌辭忤太真舞袖夜虛金掌月香囊魂墜紫丝茵可憐傾國傾城曲一度秋風一愴神次陳敬初見寄二首兼懷張仲敏至正天子明聖君早聞羔鴈聘陳羣河清地應千年瑞星聚天囘五色文遂有青鸞鳴桂樹也憐黃鵠伴沙雲詩筒坐得蘇臺使百過愁吟到落曛其二論交長歎白頭新傾蓋相知定幾人照世豈無麟閣畫買田且卜艸堂隣南州人物皆零落西漢文章尚雅馴好竹每懷張仲敏泠泠風骨水為神題娑羅室娑羅樹下幽人室山氣因之與秋碧古色猶栖竺國雲絶頂仰見扶桑日太隂垂地風雨會百尺撐空鬼神力醉呼北海起九原為爾重鐫青石壁送僧歸江隂山寺昔葛洪騎狼入此山孰知揚子江頭寺寺門髙髙樹裏開仙翁巳乘白狼去古佛或騎青象來春動水流無底谷天晴雲覆散花臺山中邑子正憶汝恰得飛空一錫迴寄陸良貴堂館緑隂皆面水圖書烏几喜無塵㯶櫚交葉繞遮井菡蓞傾花故向人世事從渠寜分拙交逰於爾覺情親澧蘭沅芷秋風裏明日南雲别更新送趙季文之湖州知事送子作官山水郡掾曹日日簿書稀放生池頭看花去浮玉山前載酒歸芙蓉入簾秋雨落䆉稏滿天寒雁飛即聞善政歌賢徳還見清光照紫微天馬二首佛郎獻馬真龍種六尺之髙脩倍之圖畫當今屬周朗歌詩傳昔勅奚斯空聞市骨千金直不羡窮荒八駿馳有客新來聞此事與君何惜滯明時其二四年逺渉流沙道筋骨權竒舊肉騣曉秣龍堆寒蹙雪晚經月窟怒追風漢文千里知曽却曹覇丹青貌不同拂拭金鞍被來好幸陪天廐玉花騘陸定之印為陸仲安賦陸家漢印吁亦絶金窠籀文盤屈鐵斯文已矣世無傳千載得之名不滅何用兵家虎作符空聞澤國龍為節勗哉玩物古有言願子文章照前烈嵗盡寄瞿慧夫瞿子作官無暇日南國臘盡未還家禁春㣲雪青青艸照眼疎枝細細花五兩即看飛落日屠蘇應待酌流霞詩成無使能將意鳬雁寒雲滿白沙水閣書事寄鄭明齋方橋匼匝小如亭山色傾江滃滃青雨裏芭蕉憐畫扇花間鸚鵡惜金屏誰傳鴻寳中篇術自寫黃庭外景經練水東頭三十里何人識得伍喬星荅吕維清兼柬鄭遂昌葛可久滄洲解纜不十日相憶題詩寄闔閭常怪接輿歌鳳鳥因憐爾雅註蟲魚台州司户頻相問勾漏仙人好附書况汝才華今亦盛五雲坊裏看徴車擬杜陵秋興八首露下大江江鴈橫窮秋搖落喚愁生波濤百里風連海砧杵千家月滿城佩劍衝衝龍匣動巢笙夜夜鳳臺清還同使者將秋色一到銀河且濯纓其二東過秦皇渡海矼波聲雲影落漎漎君平漫識支機石帝子應愁鼓瑟􅐼鳳穴朝陽鳴好樹槎頭秋水釣空江坐來清漏荒城斷愁絶飛蓬老鬢雙其三海門八月雨清霜可怪殘雷未肯藏虹蜺斷江將雨映鴐鵞背日與風翔羅含自老黃花宅裴度重來緑野堂衰暮閉門懷故舊豈因吹笛滿山陽其四巍巍北斗夜䦨干盛世無憂行路難轉粟帆檣遼海濶舞階干羽䝤夷安黃河正道流應復白月空江卧獨看願借雙飛珠樹鶴清㳺一接鳳池翰其五灤水秋風曉夜催上京宫殿䕶蓬萊扶桑日近龍波湧閶闔天髙象駕迴綵仗齊迎千騎發翠旗遙接五雲來揚雄漫有河東賦流落何人一薦才其六江上青山接甬東離離禾黍館娃宫芙蓉舊苑長洲裏麋鹿荒臺落照中銀海鴈飛沉夜月金莖露冷擢秋空可憐蕭瑟江關暮詞客哀吟思不窮其七金陵佳麗帝王州今古登臨送客愁玉樹雲連鳷鵲觀青山日落鳳凰丘荒城併與烟蕪没故國空餘漢水流渺渺江湖頻入夢蕭蕭天地不勝秋其八落日江南發棹歌楚王宫廟鬱嵯峨雨經巫峽朝雲濕木落洞庭秋水多璧月銀河空復在玉簫金管奈愁何只今文藻悲遷客何處波濤弔汨羅春閨曲緑樹鶯歌遍紅簷燕語頻所思猶逺道何用慰芳春寄衣曲蠶嵗既已畢鸎時俄復換早製邊上衣秋來愁緒亂送逺曲二首神京佳麗地萬户復千門看花三月裏慎莫過倡園其二七月發揚子八月渡黃河到京書便寄北來鴻鴈多送林尊師共謁崑崙華蓋君芙蓉旌斾雨紛紛燭龍銜火朝飛海笙鳳乘風夜入雲偷得玉桃如赤日孏將瓊笈校𤣥文倘其歸去容成洞采拾金鵞幸見分次鄭明齋柬俞彦莊韻萱草羅生已滿院篔簹初種欲遮鄰厨中雙魚好作鱠階下獨鶴長比人久欽陸賈為新語况以荀卿得大醇白首相逢在江海紫薇終願召絲綸題沈君錫畫木君不聞莊椿春秋八千嵗又不聞蟠桃一實三千齡不知此木歴年幾百萬雲氣上下摩空青羲和馭日海底出白銀宫闕搏桑暾嗟哉沈君筆力能扛百斛鼎旋轉造化何其神蛟螭走壁白日動列缺御氣流風霆勇如陸地盪舟子凛若漢廷折檻臣車行下走九折坂劍化躍入延平津大枝輪囷小枝偃千千百百子若孫六月赤日天無雲珊瑚水屋嘗隂隂與君展席坐其下聽我醉讀南華經懷張心田若人清事也無涯客去談詩到日斜愛畫龍眠好頭赤凌霄不埽落來花湘絃曲竹啼非染露山暝乃疑雲靈瑟傳神語休令帝子聞館娃曲館娃催賜宴西子猶酣酒龍輿下雲旗鳳樂迎王母銀橋星似燭翠扇花連牖歡樂殊未終鴉噪城頭栁夜起來秋生臨水殿月過望仙臺歌吹無聊賴愁吟夜起來堤上行三首碧水樓樓三月春蠻兒箇箇唱歌新通海坊中人作市靈慈宫裡樂迎神其二四月南風海岸深青旗髙髙樹隂隂三江潮發來如馬五兩風搖宻似林其三髙麗女兒珠腕繩玉環穿耳坐船棚絲為帆繂朝朝颺銅作琵琶嘖嘖鳴秋夜曲玉階月下千愁色秋水秋波振草涼烏桕風髙吹斾斾紅蕖露冷墜房房櫂歌行春江花柳月水色碧草滋嬋媛競遊盤棹歌樂芳時寳珥薰麝蘭羽蓋翔鳬鷖臨流激遺響窈窕飄鶯辭竟欲整輕橈泝洄往從之落日大江平愴然生逺思白頭吟皚皚山上雪雪積還復滅皎皎雲間月月圓有時缺周公大聖當國時流言况也讒間之結交以面心乃爾白頭不若新相知漢家宫闕長門道花發年年怨春草今朝寵固色未衰明日怨多恩反少今人輕薄懷古人古人轗軻常苦辛蘭陵廢死不歸楚嗚呼此意吾誰陳棄妾言棄妾不足惜顧顧懷君深奉妾合歡帶繫君明日心連理樹堂前好雙樹枝合葉交遮時有鴛鴦鳥來銜並蒂花征婦怨君久戍逺磧妾愁在空幃不得如春草隨春上君衣柳枝辭濯濯金明柳年年照妾容飛花怨春盡落日渡江風精衛辭海水水無底百谷流瀰瀰精衛銜木石之死心不移蓬萊幾清淺會有揚塵時眼中恨與海水平鳥飛不惜翅羽垂望夫石亭亭望夫石化石石作心丈夫無死節婦人那可輕山花滿頭雲作衣日日望夫夫不歸夫不歸淚如水至今水流流不止繫子詞鄧家兒鄧家兒長繩誰繫髙樹枝父母各逃生兒死亦孔悲弟亡一息不可棄兒雖當棄忍繫之鄧家兒哭奚為天乎天乎豈無知次韻寄野航十日不見華州掾定是清迂在箇邊青壁縁雲題石閣白沙留月繫湖船娟娟酒落杯香細闇闇梅堆雪色鮮歸來且樂嵗年暮何問他儂識太𤣥宴吕敬夫水閣暮春三月之佳日畫裏看花小閣杯一雙皓鶴廵池走百葉緋桃映綬開卷幔不知雲亂入題詩應怪雨相催武陵何處能忘世莫遣閒人取次來題野航壁大樹小樹屋東西癭頸鵓鴣來上啼明朝艓子坐天上野水壓江江日低和李長吉馬詩十二首騄驥連錢動金鞍鏤玉羈無人尋穆滿借與閬風騎其二肉礧錦纒鬃流雲汗似紅太平無戰伐驂驔走沙蓬其三龍性非凡質騰波出紫雲檀溪飛過日應識漢將軍其四龍印留官字霜花剥暗毛長鳴愁過影祇憶九方皋其五霞口鏤金勒霜蹄削玉寒曉看經邏些暮已驀樓䦨其六瘦骨如山立臨流飲渇虹誰憐中道棄苜蓿老秋風其七神駿知無匹驍騰絶域來流沙一丈雪夜拂白龍堆其八天子飛黄馬牽花賜近臣玉階新雨過風衮落花塵其九内廐玉花騘斑斑歕肉騣奚官新浴罷沙苑踏春風其十佛郎通上國萬里進龍媒曉日開閶闔虹光射玉臺其十一天馬誰能馭和鸞駕紫㣲年年清暑去霹靂逐龍飛其十二驥子大宛種房星夜降精漢家求不得兵壓貳師城襍詩三首靡靡輕薄子沓沓肩相摩營營樊中蠅撲撲火上蛾趨利不顧生是非搆讒邪所得不既少所喪良已多凄風遍大野不久當如何其二滔滔夏孟月桃李春已矣庭前兩支子其葉互相倚梧桐一髙蓋碧氣䕃清美曨曨屋東日連隂宻如齒當晝無穿影西枝覆流水鋪床終日坐兒女且驩喜有酒輒持飲聊樂我云耳貴者日以驕富者日以侈古人已云亡誰下白屋士其三京畿連大宅新賜公侯第桂樹夾道生臺觀迎風起歌麐玉階側棲鳳金􅖠裏秦娃當妙選趙舞飄輕軆大兒尚書郎小兒參國議中兒權最隆出入侍天子七葉輕漢貂八逹哂周士馮唐亦何命白首賤如此題玉山雅集愛汝西莊給事家繞屋山石何谽谺截江秀色發林壑平地玉氣貫虹霞佳處如居子午谷望中開遍冬春花夜深酒醒月在海應有仙人來繫槎與顧仲瑛書附九月初一日翼再拜向嘗見續志所書事蹟往往感於卑下雜亂無取昔揚子雲作法言拒富者之金曰圈中之鹿闌中之羊何以名為而陳夀乃求米作佳傳尚得為信史耶今必痛加繩削正其謬誤然後網羅漏失振發幽潛為一代盛典豈不偉歟夫一才一善人所難能生而積學白首而成者十無二三不幸老死岩谷又蔑蔑無聞者良可憫哉然貴者可信而易云賤者隱而難顯易云者人皆傳之難顯者人皆畧之此人之常情也春秋美君子樂道人之善所以使天下皆去惡為善此磊落喜事之人立言著書以垂後世蓋謂此也予自兒時目覩諸老先輩先生及歴歴耳聞者或仕或不仕其才徳文章書法畫品雖髙下不齊要皆百年以來育徳成材固非一朝一夕所能致也若方外之清流閨門之貞節皆灼灼可書不可有忽畧而棄置也竊見崑山人物之盛非他州可及有耆儒碩學若李季髙蓉月先生衛培月山先生二山鄭漁溪陳愛山或典章老成或經學博聞皆師儒之宗也有文章之流若俞翠峰之超逸施林塘之風騷秦徳卿之厚重汪徳載之深沉文學古之竒放馬敬常之秀麗皆士林尤著者也若楊譓之著述盧均華之教子朱翺之標格盧觀之淳古俞日强之文學李簡之清介又不可以偏長而廢也士大夫之族則朱次山之好古博雅朱仲髙之倜儻好客張心田之能書能畫顧仁山之恬退守業馬廷玉君瑞之好文雅楊仲元之世其家易兼山之吏隱顧善夫之墨妙及乎朱都水妻茅氏之貞節殷大章葬其祖伯堂之盡禮書之皆可以激厲流俗而有補於名教者也鼔琴之妙則宋尹文為之魁甲屠雲岩秦徳齊王彦明楊景文又皆鏗鏘於浙操者也方外詩僧則大無外者省夢庵者理獨間者唐西白者器大用者慶雲岡者皆齊已靈澈之流也顔悦堂編蒲之有室栢子庭不繫之有舟寳雲海之宗乘亮虛白之圖畫秉白雲之干林閣莊蒙泉之大寳洲方之髙僧無與倫比道士則殷在山章句可推蔡雲谷駢儷可法張虚谷之飄然髙舉楊春雲之多藝多材是亦不可盡棄者也題咏記述則大成殿玉芝之有詩靈慈宫餉運之有記以至齋宫之銘塜墓之碣一言一咏皆名流朝士聚精㑹神極其盛者又若袁子英之髙節樓瞿惠夫之夀豈堂姚文奐之書聲秦文仲之鶴塚張師賢之芝蘭堂吕敬夫之來鶴亭盧伯融觀雲之軒陸良貴乾乾之室盧公武之鹿城隱居古人云境因人勝此皆一時出羣之材其文章節槩固非泯泯黙黙而已者又若顧伯衡顧子逹嚴孟賔項叔馭俞復初皆進進而不已者誠非他郡所可彷彿也所謂不傳於今必傳於後萬萬無可疑者惟執事持至公之論去常人之見念聖人才難之歎樂春秋與善之誠無一毫嫌疑以自阻則舉讐舉子之事不得専美於前矣林外野言卷下
