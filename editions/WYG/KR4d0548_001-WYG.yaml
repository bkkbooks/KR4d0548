body:
  text: 林外野言卷上元郭翼撰精衛操東海水雖大精衛心不移銜石填海有滿時有滿時海有底吁嗟人心不如海花㳺曲石池天地花溟濛芙蓉暖紅旗颭風錦艚兩帆出雲裏玉艷搖溶養龍水寳坊壁堂山入門璚琚雜珮飄輕裙館娃愁絶行春歩青狐泣冷鴛鴦墓鉄蛟噴壑風雨來花宫香送瓊英杯玉粒松膏粉雲椀小扇桃歌紫牙板苧蘿烟斷東海西雙璫椷札近新題青鳥不來無信使玉雁銜絲啼十四真珠字宻愁滿箋為君重賦花遊篇和顧子逹見寄二首江上去年來避寇無家歸路轉淒迷桃花栁絮當三月瘴雨蠻烟似五溪直見荒臺麋鹿走可憐無樹鳳凰棲讀書支子橋邊宅瓦礫傷心暗蒺藜其二君住同丘似同谷閒身應是笑官忙梅花有興吟東閣萱草無憂樹北堂謾省觀魚莊叟樂誰憐歌鳳接輿狂相看馬困鹽車日何處悲鳴覔九方城南艸堂與顧仲瑛夜話花發草堂風雨春青燈剪韭話情親亂離隔世今何夕生死論交竟幾人城郭是非華表鶴蓬萊清淺海中塵三千賔客馮驩在莫怪悲歌撫劔頻聞吕敬夫移居五首憶汝秋來信使稀移家未覩是耶非月星繞樹烏三匝風雨橫江雁獨飛豈為故人居赤甲還從野老款荆扉東西擾擾皆為客琴劔空慚坐不歸其二詹尹何勞更决疑衡門之下可棲遲竹從少傅韋家覓樹向果園坊裏移翡翠小堂巢窄窄鷗鶄近渚檻垂垂主人一任懸徐榻更擬風流醉習池其三卜築因同野老居家貧猶有五車書從人更買青田鶴入饌頻供丙穴魚謝朓能詩多警策嵇康嬾性且麤疎江頭樹裏晴雲出日日看山候小車其四餘暑醉人猶困酒秋風秋雨下朝朝頗聞蔣詡開三徑未識將軍第五橋月裏芙蓉催放艇天頭鸞鶴待鳴簫海鄉應訝文星聚莫以尋常折簡招其五雨映清秋解鬱陶無端舒嘯倚東皋終懷楚國屠羊肆已媿江州食犬牢五夜新凉吹枕几十年舊夢落波濤老來已慕歸耕好田屋芃芃黍豆髙巴湖春暮巴城湖頭日欲曛巴王廟下水如雲漁船歸去打雙槳鷗鳥飜迴飛一羣野曠天開秋歴歴霜清木落雨紛紛杜陵飄泊誰知己搔首風塵正憶君題景徳寺櫻桃上人醉卧櫻桃發客至不知山日斜粲然五闕庭下雪開作小白岩前花仙女吹笙闕宻背痒欲倩麻姑爬闕書聲齋幽人一室開風露坐想瀛洲玉為署把書夜誦秋滿空徘徊花影蟾蜍樹蓮葉艇子風泠泠太乙下照藜火青笙簧塞耳洗不醒漻哉太音誰得聽雪後逰華藏寺快雪時晴西日㣲隂隂碧殿鎖林扉山中白雲好留客枝上野梅寒拂衣經床無風花自落瓊田如海鶴爭飛諸郎授簡皆能賦况復東林此會稀登文筆峰借得登山靈運屐乾坤眺望倚巑岏上方日落樓臺碧積雨春深艸木寒戰馬中原連萬國風檣巨海隔三韓寥寥宇宙懷今古墮泪之碑幾度㸔寄于彦成兼柬玉山匡廬道士三尺强手援北斗酌桂漿露氣朝開瑪瑙甕丹光夜落芙蓉牀崆峒仙人廣成子鑑湖狂客賀知章主人種梅已成屋憶爾看雲眠艸堂漫興三月既望出北郭艸堂樽爼特風流戴花一任巾幘岸酌酒且將車轄投骯髒倚門徒自惜慵疎與世豈無謀青春正好莫嫌晚取次習家池上遊春日有懷二首二月作客楊家巷東望滄浪眼欲醒雲樓吐氣蛟蜃紫海户送色蓬萊青也知奔走非我事直以疎慵任性靈别後憶君兼日夜滿江風雪况如馨其二客裏青春愁不禁月頭月尾雨隂隂海棠結巢花匼匝楊柳滿門江淺深竟日笙囊寒未解臨池盤醆晚纔斟諸郎怕有乘舟興怪煞喧喧鵲報音玉山草堂玉山草堂誰比數風流不減浣溪頭碧梧翠竹一箇箇鷺絲鸂鶒兩悠悠吹笙子晉尋常過愛酒山公爛熳㳺但道幽棲嫌早計須君更上鳳麟洲再題玉山草堂趣絶殊風烟白石路縈迂寄詩未荅髙常侍簇馬或迎嚴大夫花徑埽晴當晚雪榿林移雨接春湖主人結搆知幽寂還約看山傍酒壺澹香亭别館閒時擲果車澹香亭下賞春華東闌恰好清明節千樹都開爛漫花綺席霏霏吹雪暖霓裳疊疊舞風斜魏公翰墨秦家得一字千金未足誇南湖有懷玉山之詩尚清省草堂緗帙動星光兒郎箇箇荀文若賔客入人馬季良月裏吹簫眠複閣花間移艇過漁莊酒酣側近江頭别獨坐南湖意不忘漫興一首前月海寇入郡郭病裏移家愁殺人桃花野屋苦多雨楊栁清江無好春誰似龎公居隴畆自慙杜老在風塵草堂夢寐驚相見把酒論詩月色新拜石壇偉兹秀石竒而雄億千萬年夀作朋何年天公召雷公下驅六丁鑿濛鴻巨斧落手驚飛龍初疑帝遣神鼇首戴海上之青峰又疑星蕋墮地變化為芙蓉神物之神固有馮一朝當變遷霹靂千丈崩左股臂折卧棘蓬虎頭顛絶如南宫作壇置之衆不驚如在培塿視華嵩題識况重仇池翁仇池雪浪空玲瓏丹丘白野拜下風嗟哉天地生物功一成一毁無終窮人之顯晦靡不同吾嘗視天唯夢夢貴賤夀夭初無定幽人采薇窮谷中石也幸爾千載逢能令人拜壇再登洛陽丘墟牛李死甲乙零落平泉空溝中之斷㸑下桐荆山玉氣吐長虹賀爾遭也天所蒙賀爾遭也天所蒙白雲海青田生鶴子隨母青田飛母飛向天去𤣥裳縞其衣千年歸來華表鶴鶴雛悲鳴西日落好將商墓寺前雲飛還直過青山郭寄馬敬常奈爾相如好賦何老懷猶得慰蹉跎五侯冠蓋殊皆貴百世文章自不磨沙漠黃雲龍去逺江湖秋水雁飛多旌旄海上重開府還擬扁舟雪夜過寄青龍瞿惠夫博士醉眠亭上追遊日為惜髙情對物華草港鬬飛花鴨雨竹沙深映白鷴罝叢叢山影侵雲直一一人家落路斜近報風流多著作門生若箇是侯芭著一作述荷亭晚坐寄悦堂長老海上無家來避冦行吟何處可銷憂㸔荷偶到東林寺落日渾如丈八溝雲葉層隂青過㟁艸堂五月澹於秋老子情深能愛客更擬花開一醉留崑山即事寄友人人家繞郭連鳬雁井落荒凉接野坰湓瀆雨來秋水暗馬鞍雲盡暮峰青宿艸屢過劉君墓紫藤長倚范公亭結鄰最晚還相並海上長嗟處士星過綽墩舟中奉寄玉山綽墩樹色青如薺蕩裏張帆曉鏡開烏目峰髙雲北下白沙湖濶水西來菰蔣打雨鳴還止鸂鶒迎船舞却迴好入桃源張渥畫祇慙楊馬是仙才白沙湖濶一作沙湖波闊同敬常汎婁江春江一畨㳺春艇澹沲青山東復東楊柳孤村寒食雨流鶯百囀落花風卷題宫錦駝泥紫杯汎仙桃枸杞紅鐵龍後夜來同聽擬借琴髙赤鯉公蒼筤竹軒清風峽上蒼筤竹箇箇繞軒隂滿庭秋聲夜覺烟波逺雲氣曉拂鑑湖清親題白野尚書額好勒金華太史銘老去幾時探禹穴與子同躡鳳凰翎緑隂亭緑隂亭上夏五月瀛洲上客與俱來日出衆鳥繞屋語竹深好花當户開鏡裏水涵萍似粟席間雲落酒如苔更貪賀監清狂甚艇子朝朝暮暮迴放生池放生池館信竒哉面面芙蓉夾坐開户外香烟浮翡翠殿頭雲氣接蓬萊曽聞子晉吹笙過或遇安期送棗來羽客歩虛明月夜珮環鏘玉下層臺追和龍洲先生登多景樓詩就題其墓黃鶴磯頭風雨秋中原一望使人愁東江風雨一斗酒大地山河百尺樓羣臣誰决和戎議九廟猶銜誤國羞慷慨魯連寜入海淒涼王粲重登樓荒岡四尺先生墓再拜酧之雙玉舟省臣遣館士秦約陸仁祭龍洲先生墓因作詩送之龍洲湖海士瘞玉崑山阿山川邈如昨喬木拱􅃄蘿偉哉二三子覽古發嘯歌披荆弔遺跡窆石臨嵳峩慨嗟嵗月流奈此湮没何立闕表隧道大刻盤蛟鼉維時春載陽好鳥鳴聲和麗牲拜墓下冠蓋相駢羅山僧出遺墨保䕶百年多縱橫廿八字恍若龍騰梭緬懷攜彘酒風雨渡江沱中原雖在望泪落如懸河安得起九泉執手予婆挲歸憩𤣥館夕凉風水㣲波詩成想丰采寤寐倘來過漁莊山色桃花裏漁莊信少雙鷗羣迴落日魚笱聚深矼楊栁秋開屋蒹葭雨滿江野翁歸醉晚水没繫船椿春波曲妾家紅蕖曲緑水春滿滿鸂鶒不肯飛雙棲落花暖桓王墓客行古城下下有桓王墓古城多秋艸牛羊下來暮簫史趙信卿謁玉山昆季且欲登碧梧翠竹之堂詩以道其行金粟池頭花皜皜緑隂亭下樹𡨕𡨕一曲重聞簫史過月明憶上鳳凰翎遊仙詞八首銀流萬里海雲東只泛靈槎上碧空仙女踏歌星影裏老龍吹笛浪花中其二金粟天髙碧殿雲鏡中空影夜氤氲白鸞樹下三千女一色龍綃玉雪裙其三令威化鶴已千春華表歸來是後身城郭悲歌荒塚在到頭應媿學仙人其四白鶴下啄瑶艸庭道士夜讀神農經問之長生有寳訣授以松根千嵗苓其五溪水流香飯熟麻洞中千樹玉桃花金盤日日飛仙供勅賜安期海上𤓰其六鬱蕭臺上會羣仙龍燭飛光曉夜然玉殿歸來環珮冷白雲猶䕶古苔篇其七麟洲宫殿五雲髙夜赴瑤池宴碧桃借得仙人紅尾鳳月中飛影拂波濤其八鈞天按樂樂蓬瀛手把芙蓉朝太清一曲霓裳羽衣舞仙家只數董雙成柳塘春隂隂覆地十餘畆嫋嫋迴塘二月風雨過鷗眠沙色裏花飛鶯亂水聲中題雲間徐希哲竹庭卷軒外閒亭百歩寛不栽桃李盡琅玕幽深自與塵氛逺瀟洒偏禁雨雪寒湘浦夜濤欹枕聽渭川晴色卷簾看春來更愛兒孫長玉立森森擬謝蘭清真觀即宋放生池放生池上應五月爛熳花開坐夜長月出金盤擎露影天髙玉井散秋香雲邊小溆瀛洲近鏡裏㣲波太液涼准擬王喬借飛舄仙遊從此恣翺翔行路難七首贈君葡萄之芳醇璚瑰玉佩之鏘鳴昆吾鹿盧之寳劔空桑龍門之瑟琴紅顔暉暉不長盛流光欺人忽西沉願君和樂兮欣欣聽我再歌行路吟不見陸機華亭上寥寥鶴唳詎可聞朝愁不能驅暮愁不可處中區何陿隘乘雲汗漫瑤之圃爰從王母訪井公復約元君謁東父靈桃花開銀露臺玉文棗熟青琳宇我願於焉此中息錫以遐年永終古其二君不見草木榮復凋青青摧折風霜朝人生寓一世何異石火飛流猋貴賤夀夭百年殊死者前後孰可逃當年稱意即可樂烹羊炰羔召同僚莫令閒慮損汝神未老面黧毛髪焦岡頭松栢多髙墳聲譽俱逐塵壤消令人及此意沈菀上堂鼔瑟歌詩謠其三門前十字街車輪馬脚不可遮馳名逐勢死不畏赤手生拔鯨魚牙得之未足為身榮敗者顛倒紛若麻嗟予無能守命分樂取意適不願奢諸君惘惘胡不思來日苦少去日多丈夫闔棺事始定何用無益長怨嗟其四秦女卷衣咸陽宫蘭烟桂霰茱茰芳泥金爛爛輝五綵新衣新賜蘇合房朝擁羣仙行羲和御車駕飛龍暮從天女㳺月中吹笙鳳鳴空君恩恐移今已衰羞將淚滴紅芙蓉寜作蓬池並翼鳥飛飛到死成匹雙其五蹙蹙靡所騁出自城北門顧瞻荒丘中鬱鬱蹲石麟石闕字漫漫不知何代貴者墳形骸已滅魑魅跡物化盡為狐塵吁嗟漢家陵闕荒無主青山落日秦川下猶聞樗里有智人天子之宫夾其墓今日休論智與愚昔人意氣復何如願借飄颻丹鳳舄與子鍊形入雲墟其六庭前芳樹花參差嵗嵗争新滿舊枝開白開紅接芳葉撩亂二月三月時昔日美人顔似花看花暮去朝復來紅夾羅襦泫香露青天白日春風吹惋惋含悲思百年何人得長好嘆息謂君君不知其七君不見流水泯泯去不還日月攪攪曽無閒人生長苦死催促富貴早來開我顔飲酒飲不多直愛美人揚美歌即今受樂亦已晚過眼百年能幾何送盧公武應召北上前朝圖史已全收詔起丘園重纂修一道同風遵禮樂大書特筆法春秋金壺墨㵼朝揮洒銀燭花消夜校讎進卷内廷承顧問鵠袍端立殿西頭漫興九首瞿盧袁陸思清警要我題詩來鶴亭月下吹笙看舞影竹中移柵䕶霜翎其二廣平梅詞吐清婉惠連雪賦映嬋娟况有文章兼二美吕家亭子得無傳其三白雲滿地如白石明月窺江來近人最憶滎陽好兄弟著霜柿葉冩詩新其四淮泗大水斷禾黍聞道居人巢樹頭漢武曽聞歌瓠子老翁更儗賦黃樓其五城南市中有楚客醉卧髙樓看月生兩兒共扶不肯下紫簫吹度到天明其六側聞朝家置史館須得班馬出羣材掲公已老歐陽死近者何堪為緫裁其七北山一士禪宗秀爛漫交情只憶渠每與王郎傳詛楚不同懷素學狂書其八永嘉為儒有陳子更思文雅得曹髯麟趾鳳毛不復見龍文虎脊有誰兼其九江上十月風日好小桃欲開春可憐絶勝龍沙三尺雪雕弓射雁拂廬前林外野言卷上
