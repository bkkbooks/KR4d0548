body:
  text: 林外野言别集類四元提要臣等謹案林外野言二卷元郭翼撰翼字熙仲崑山人少從衛培學精於易義嘗獻策張士誠不能用歸耕婁上老得訓導官竟與時忤偃蹇以沒盧熊為作墓志見朱圭名迹録中翼明敏博學不屑為舉子業専意作古文詞尤工於詩嘗自號東郭生又稱野翁而名所著集曰林外野言今所傳凡上下二卷附與顧仲瑛書一篇考玉山名勝乾坤清氣諸集所録翼詩不見此集者尚多疑已為翼所刪棄又如題劉龍洲墓送道士遊武當諸詩皆别見吕誠集中則或編詩者所誤入未可知也翼從楊維楨遊為詩盤屈清硬頗近其流派維楨亦深以精悍許之其間如望夫石精衛詞諸篇皆用鐵崖樂府體尤為酷似要其筆力挺徑絶無懦響在元季吳下詩人中可謂矯然特出者矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5f9193cdf4e03817ca1c03e248733b0313932b6cdb7a32cb7535f9c21693bb64
